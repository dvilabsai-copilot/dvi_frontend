name: Deploy DVI Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_DVI_BASE_URL: ${{ secrets.VITE_API_DVI_BASE_URL }}

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Upload dist with rsync
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 30 -t ed25519 -p "$DO_PORT" -H "$DO_HOST" >> ~/.ssh/known_hosts
          ssh -p "$DO_PORT" \
            -o HostKeyAlgorithms=ssh-ed25519 \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "$DO_USERNAME@$DO_HOST" \
            "mkdir -p /tmp/dvi-frontend-deploy/dist"
          rsync -az --delete --partial --timeout=600 --info=progress2 \
            -e "ssh -p $DO_PORT -o HostKeyAlgorithms=ssh-ed25519 -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            dist/ "$DO_USERNAME@$DO_HOST:/tmp/dvi-frontend-deploy/dist/"

      - name: Move build to live folder
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_PORT: ${{ secrets.DO_PORT }}
          DO_USERNAME: ${{ secrets.DO_USERNAME }}
        run: |
          set -euo pipefail
          ssh -p "$DO_PORT" \
            -o HostKeyAlgorithms=ssh-ed25519 \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "$DO_USERNAME@$DO_HOST" <<'REMOTE'
          set -e
          sudo mkdir -p /var/www/dvi-travel
          sudo rsync -a --delete /tmp/dvi-frontend-deploy/dist/ /var/www/dvi-travel/
          sudo chown -R www-data:www-data /var/www/dvi-travel
          sudo nginx -t
          sudo systemctl reload nginx
          sudo rm -rf /tmp/dvi-frontend-deploy
          REMOTE
